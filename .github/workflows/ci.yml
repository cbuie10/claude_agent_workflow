name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install ETL dependencies
        run: cd projects/prefect-etl && uv sync --all-extras

      - name: Lint ETL project
        run: cd projects/prefect-etl && uv run ruff check src/ tests/

      - name: Test ETL project
        run: cd projects/prefect-etl && uv run pytest tests/ -v

      - name: Install MCP dependencies
        run: cd projects/mssql-mcp && uv sync --all-extras

      - name: Lint MCP project
        run: cd projects/mssql-mcp && uv run ruff check src/ tests/

      - name: Test MCP project
        run: cd projects/mssql-mcp && uv run pytest tests/ -v
